services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.batch_tasks.celery_app worker --loglevel=info --concurrency=2
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 3072M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend
    # === GÜVENLİK: Miner saldırısını engeller ===
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev   # yazılabilir ama çalıştırılamaz
      - /app/.next/cache:size=200m           # Next.js cache için
    security_opt:
      - no-new-privileges:true               # privilege escalation kapatılı
    cap_drop:
      - ALL                                  # tüm Linux capabilit'ler kaldırıldı
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M
          pids: 100                          # max 100 process (miner fork bomb engeli)
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection({port:3000,host:'127.0.0.1'}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "pgrep", "nginx"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
