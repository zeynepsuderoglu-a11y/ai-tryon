events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;

    # Güvenlik: nginx versiyon bilgisini gizle
    server_tokens off;

    # Docker iç DNS resolver — container rebuild sonrası otomatik yeniden çözümleme
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Rate limiting: brute-force ve DDoS engeli
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # HTTP → HTTPS yönlendirme
    server {
        listen 80;
        server_name studyoima.com www.studyoima.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name studyoima.com www.studyoima.com;

        ssl_certificate /etc/letsencrypt/live/studyoima.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/studyoima.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Güvenlik header'ları
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Bağlantı limiti
        limit_conn addr 20;

        # Backend API — değişken kullanımı Docker DNS yeniden çözümlemesini zorlar
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Login endpoint'i için daha sıkı rate limit
        location /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend — değişken kullanımı Docker DNS yeniden çözümlemesini zorlar
        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
