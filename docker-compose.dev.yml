version: "3.9"

# Development compose — only infrastructure services
# Run backend and frontend locally

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tryon
      POSTGRES_PASSWORD: tryon123
      POSTGRES_DB: tryon_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tryon -d tryon_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
